<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/4a5790dcb3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="login\sty.css">
    <title>Login</title>
</head>
<body>

    <div class="container">
        <div class="form-login">
            <form>

                <h1>LOGIN</h1>

                <div class="input-box">
                    <label for="email">Email</label>
                    <input type="text" id="email" placeholder="Digite seu email..." required> <i class="fa-solid fa-circle-user"></i>
                </div>

                <div class="input-box">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha..." required> <i class="fa-solid fa-lock"></i>
                </div>

                <div class="forgot-pass">
                    <a href="#">Recuperar senha</a>
                </div>

                <button type="submit">Confirmar</button>
            </form>
        </div>
    </div>
    
</body>
</html>
