<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sty.css">
    <script src="https://kit.fontawesome.com/4a5790dcb3.js" crossorigin="anonymous"></script>
    <title>Login</title>
</head>
<body>

    <div class="container">
        <div class="form-login">
            <form>

                <h1>Entrar na conta</h1>

                <div class="input-box">
                    
                    <input type="text" id="email" placeholder="E-mail" required> <i class="fa-solid fa-circle-user"></i>
                </div>

                <div class="input-box">
                   
                    <input type="password" id="senha" placeholder="Senha" required> <i class="fa-solid fa-lock"></i>
                </div>

                <div class="forgot-pass">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <div class="create-account">
                    <p>Não tem uma conta?</p>
                    <a href="#">Cadastre-se</a>
                </div>

                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
    
</body>
</html>
